# -------------------------------------------------------------------
# Example 4 — Knightian category 4 (strategic uncertainty)
# -------------------------------------------------------------------
frame_id: K4-001
category: strategic-uncertainty
question: |
  You are negotiating a contract with an unknown counterparty. Their type —
  cooperative or adversarial — is uniformly distributed in your prior.
  Should your opening offer signal openness (revealing your reservation
  price) or maintain strategic ambiguity?
answer_format: categorical
answer_choices: [signal, ambiguity, cannot-be-determined]
gold_answer: null
grading_method: auto-string-match
synonyms:
  signal: [signal, signal-openness, openness, reveal, transparent]
  ambiguity: [ambiguity, strategic-ambiguity, hold, conceal, withhold]
  cannot-be-determined: [cannot-be-determined, unknown, depends, conditional]
metadata:
  source: synthetic
  source_url: null
  difficulty_estimate: 4
  knightian_criteria_satisfied: [K1, K2, K3]
  contamination_risk: low
  domain: game-theory
  resolution_year: null
  notes: |
    Information-economics literature contains arguments on both sides;
    no settled position under uniform-prior opponent type.

