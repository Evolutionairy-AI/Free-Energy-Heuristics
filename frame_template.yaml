# -------------------------------------------------------------------
# Example 3 — Knightian category 3 (open-ended dilemma)
# -------------------------------------------------------------------
frame_id: K3-001
category: open-ended-dilemma
question: |
  A hospital ICU must allocate one ventilator between two patients with
  identical clinical profiles. Patient A is a 35-year-old single parent;
  patient B is a 65-year-old senior physician. What's the most ethically
  defensible decision procedure?
answer_format: short-open
answer_choices: null
gold_answer: null
grading_method: expert-coherence
synonyms: null
metadata:
  source: synthetic           # informed by contested medical-ethics literature
  source_url: null
  difficulty_estimate: 4
  knightian_criteria_satisfied: [K1, K2]   # K3 partial (literature exists but contested)
  contamination_risk: medium  # medical-ethics literature is plausibly indexed
  domain: medical-ethics
  resolution_year: null
  notes: |
    Triage allocation under tied clinical priors. Tests value-framework
    meta-uncertainty: utilitarian, deontological, virtue-ethical, and
    procedural-justice frameworks give different answers. No settled
    answer in the applied-ethics literature.

