# FEH-79 Item Pool — v0.4
#
# Full benchmark item pool per Chapter 4 §§4.4-4.5 of the FEH manuscript.
# 77 Knightian frames + 62 control items = 139 items total.
#
# Changelog
#   v0.1 → v0.2: 5 items (K1-005, K2-016, K4-001, K4-003, K4-004) replaced after
#     a K2 cross-model pre-screen (Claude-4.5/GPT-4o/Gemini-2.5-Flash/Mistral-
#     Large) showed unanimous-substantive agreement on the v0.1 versions;
#     replacements re-validated against the refined K2 criterion (§4.3 v0.2).
#   v0.2 → v0.3 (2026-05-14): K1-005/K2-005/K4-003 multi-seed re-validated;
#     R-101..R-112 arithmetic-calibration tier (12 items) added.
#   v0.3 → v0.4 (2026-05-29, pre-data): repaired 8 Knightian items that were
#     tagged `auto-string-match` but carried neither a gold answer nor a
#     `cannot-be-determined` choice (un-scorable as written). Each was sorted by
#     the test "what would a flawless reasoner conclude?":
#       • cbd is the correct answer  → added cbd (now cbd-scorable):
#           K1-005, K2-007, K2-018
#       • genuinely contested, no objective key → reclassified expert-coherence:
#           K4-001, K4-004, K4-008
#       • a defensible reasoned answer exists → not truly Knightian; cut to avoid
#         confounding the high-regime bin:  K2-010, K2-013
#     Net: cbd-scorable 28→31, expert-coherence 43→46, K2 20→18. v0.3 is
#     preserved unchanged as the registered record.
#
# Schema: see frame_template.yaml for field definitions.
# Categories (v0.4):
#   K1 — non-recurrent-forecasting       (20 frames)
#   K2 — novel-synthetic                  (18 frames)  [K2-010, K2-013 cut in v0.4]
#   K3 — open-ended-dilemma               (20 frames)
#   K4 — strategic-uncertainty            (19 frames)
#   R  — reference (control)              (22 items: 10 canonical + 12 arithmetic-calibration R-101..R-112)
#   A  — aleatory (control)               (10 items)
#   CB — calibration-probe (control)      (30 items)
#
# Common synonym dictionaries are inlined per item. For YAML parsers that
# support anchors, the canonical yes/no/cbd block is reproduced as needed.
# All forecasting items resolve in 2027 or later; all K2 items reference
# author-coined entities with verified zero-Google-result floors.

