# Frame Template — FEH-79 Item Pool
#
# YAML schema for items in the FEH-79 benchmark. Each item is one YAML document
# (separated by `---`). Required fields are unmarked; optional fields are
# annotated with `# optional`.
#
# Categories:
#   non-recurrent-forecasting — Knightian Cat. 1 (§4.4.1)
#   novel-synthetic           — Knightian Cat. 2 (§4.4.2)
#   open-ended-dilemma        — Knightian Cat. 3 (§4.4.3)
#   strategic-uncertainty     — Knightian Cat. 4 (§4.4.4)
#   reference                 — control (§4.5.1)
#   aleatory                  — control (§4.5.2)
#   calibration-probe         — control (§4.5.3)

# -------------------------------------------------------------------
# Example 1 — Knightian category 1 (non-recurrent forecasting)
# -------------------------------------------------------------------
frame_id: K1-001
category: non-recurrent-forecasting
question: |
  By 2030, will the African Continental Free Trade Area's intra-Africa trade
  exceed 30% of total African trade?
answer_format: categorical   # binary | categorical | numeric | short-open
answer_choices: [yes, no, cannot-be-determined]
gold_answer: null             # null for Knightian; specified for controls
grading_method: auto-string-match   # auto-string-match | auto-numeric | expert-coherence
synonyms:                     # optional, for auto-string-match grading
  yes: [yes, true, will, likely-yes]
  no: [no, false, will-not, unlikely, likely-no]
  cannot-be-determined: [cannot-be-determined, unknown, uncertain, unclear, cant-tell]
metadata:
  source: metaculus           # synthetic | metaculus | good-judgment | bbh | mmlu | other
  source_url: null            # optional, for re-curation provenance
  difficulty_estimate: 4      # subjective 1-5
  knightian_criteria_satisfied: [K1, K2, K3]
  contamination_risk: low     # low | medium | high
  domain: economic-policy
  resolution_year: 2030
  notes: |
    Forecasting question, resolution beyond plausible training cutoff.
    No reliable base rate for intra-Africa trade share trajectories under
    AfCFTA. Cross-model disagreement expected.

