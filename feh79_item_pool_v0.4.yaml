  notes: |
    v0.3 replacement for v0.2 K4-003 (5-firm data-sharing
    threshold), which failed multi-seed K2 (85% modal `withhold`
    across claude+gpt4+mistral) because the clean payoff structure
    ($300K share-cost vs $1M-or-zero benefit) plus no-info-on-others
    triggered the maxmin reflex (withhold dominates because share
    risks $300K loss). The replacement adds a Knightian downside to
    withholding: an unknown regulator may impose $1.5M mandatory-
    audit costs on non-committers with publicly-unknown probability.
    Both pure strategies now carry Knightian risk — committing risks
    a bounded $500K loss if <3 commit; withholding risks $1.5M with
    unknown probability. No textbook equilibrium concept resolves the
    choice; expected to elicit either cross-model substantive
    disagreement or convergent cbd.

