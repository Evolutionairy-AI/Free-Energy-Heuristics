# -------------------------------------------------------------------
# Example 2 — Knightian category 2 (novel/synthetic scenario)
# -------------------------------------------------------------------
frame_id: K2-001
category: novel-synthetic
question: |
  In the Quogard people's social structure, a custom called *sintering* is
  performed before any major communal decision. A visiting anthropologist
  must decide whether to participate in sintering to gain community trust,
  or to refuse in order to maintain methodological neutrality. Which is
  the wiser professional choice?
answer_format: categorical
answer_choices: [participate, refuse]
gold_answer: null
grading_method: expert-coherence
synonyms: null
metadata:
  source: synthetic
  source_url: null
  difficulty_estimate: 3
  knightian_criteria_satisfied: [K1, K2, K3]
  contamination_risk: low
  domain: applied-ethics-fictional
  resolution_year: null
  notes: |
    Quogard and sintering are author-coined. Google-result floor verified
    at zero. The question has no determinate answer; tests coherence of
    LLM reasoning about contested professional ethics in a stipulated
    cultural context.

